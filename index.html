<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Place prompt-driven annotations on an overhead game map.">
    <title>Map Annotator</title>
    <link rel="stylesheet" href="./style.css?v=20260721-1">
    <script src="./app.js?v=20260721-1" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <p class="eyebrow">Prompt-driven positioning</p>
        <h1>Map Annotator</h1>
        <p class="intro">Choose a scenario, then click the requested location on the map.</p>
      </header>

      <section class="selector-panel" aria-label="Annotation set">
        <label>
          <span>Map</span>
          <select id="map-select" aria-label="Map"></select>
        </label>
        <label>
          <span>Hero</span>
          <select id="hero-select" aria-label="Hero"></select>
        </label>
        <label>
          <span>Mode</span>
          <select id="mode-select" aria-label="Mode"></select>
        </label>
      </section>

      <section class="task-panel" aria-labelledby="task-prompt">
        <p id="progress" class="progress">Point 1 of 1</p>
        <h2 id="task-prompt">Loading prompt…</h2>
        <a
          id="task-source"
          class="task-source"
          target="_blank"
          rel="noopener noreferrer"
          hidden
        ></a>
      </section>

      <div class="map-frame">
        <div
          id="map-stage"
          class="map-stage"
          aria-describedby="task-prompt"
          aria-disabled="true"
        >
          <img id="map-image" alt="" draggable="false">
          <span id="marker" class="marker" aria-hidden="true" hidden></span>
        </div>
      </div>

      <nav class="task-navigation" aria-label="Prompt navigation">
        <button id="previous-button" type="button">Previous</button>
        <button id="next-button" type="button">Next</button>
      </nav>

      <div class="status-row">
        <p id="status" class="status" role="status" aria-live="polite">Loading saved points…</p>
      </div>

      <noscript>This app requires JavaScript to load and save map annotations.</noscript>
    </main>
  </body>
</html>
